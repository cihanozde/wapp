name: Windows EXE Olusturucu

on:
  push:
    branches: [ "main" ] # Kodu her güncellediğinde çalışır

jobs:
  build:
    runs-on: windows-latest # Kritik nokta: GitHub senin için Windows açıyor!

    steps:
    - uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit selenium pandas openpyxl webdriver-manager

    - name: EXE Derle
      run: |
        pyinstaller --onefile --windowed --name "WhatsApp_Gonderici" wa2.py

    - name: Dosyayi Yukle (Artifact)
      uses: actions/upload-artifact@v3
      with:
        name: WhatsApp_Windows_EXE
        path: dist/WhatsApp_Gonderici.exe