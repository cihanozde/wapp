name: Windows EXE Olusturucu

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4 # v3 -> v4 yapıldı

    - name: Python Kur
      uses: actions/setup-python@v5 # v4 -> v5 yapıldı
      with:
        python-version: '3.11'

    - name: Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit selenium pandas openpyxl webdriver-manager

    - name: EXE Derle
      run: |
        pyinstaller --onefile --windowed --name "WhatsApp_Gonderici" wa2.py

    - name: Dosyayi Yukle (Artifact)
      uses: actions/upload-artifact@v4 # KRİTİK GÜNCELLEME: v3 -> v4
      with:
        name: WhatsApp_Windows_EXE
        path: dist/WhatsApp_Gonderici.exe